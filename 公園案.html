<style>
:root{--bg:#ecebe7;--paper:#f7f6f2;--ink:#151916;--muted:#6a706b;--line:#d5d6ce;--line-strong:#afb3a8;--green:#3d624d;--green-soft:#e7efe7;--orange:#d85f43;--orange-soft:#fae8e2;--radius:14px;--font:'Noto Sans JP','Yu Gothic UI',sans-serif;--mono:'DM Mono',monospace}
*{box-sizing:border-box}html,body{height:100%}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font);font-size:13px;line-height:1.55}a{color:inherit}
.app{height:100dvh;display:grid;grid-template-columns:390px 1fr;grid-template-rows:1fr;overflow:hidden}.sidebar{position:relative;z-index:20;background:var(--paper);border-right:1px solid var(--line);min-width:0;display:grid;grid-template-rows:auto auto 1fr}.brand{padding:26px 24px 20px;border-bottom:1px solid var(--line)}.eyebrow{font:500 10px var(--mono);letter-spacing:.13em;text-transform:uppercase;color:var(--green);margin-bottom:12px}.brand h1{font-size:24px;letter-spacing:-.035em;line-height:1.3;margin:0}.brand p{margin:8px 0 0;color:var(--muted);font-size:12px;line-height:1.75}.brand .count{font:500 10px var(--mono);color:var(--muted);margin-top:14px}
.filters{padding:16px 18px;border-bottom:1px solid var(--line);display:grid;gap:9px}.searchwrap{display:flex;align-items:center;border:1px solid var(--line-strong);background:#fff;border-radius:8px;height:40px;padding:0 11px;gap:8px}.searchwrap svg{width:15px;height:15px;color:var(--muted);flex:none}.searchwrap input{border:0;outline:0;font:inherit;width:100%;background:transparent;color:var(--ink)}.searchwrap input::placeholder{color:#9a9e97}.filterrow{display:grid;grid-template-columns:1fr 1fr;gap:7px}.field select{width:100%;height:34px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--ink);padding:0 8px;font:500 11px var(--font)}.filterfoot{display:flex;align-items:center;justify-content:space-between;margin-top:2px}.filterfoot button{border:0;background:transparent;color:var(--muted);font:500 10px var(--mono);padding:2px 0;cursor:pointer;text-decoration:underline;text-underline-offset:3px}.filterfoot .sync{font:500 9px var(--mono);color:var(--green)}
.results{min-height:0;display:grid;grid-template-rows:auto 1fr}.results-head{padding:12px 18px 10px;display:flex;justify-content:space-between;align-items:center}.result-note{font:500 10px var(--mono);color:var(--muted)}.seg{display:flex;border:1px solid var(--line);border-radius:7px;overflow:hidden}.seg button{border:0;background:#fff;height:28px;padding:0 8px;font:500 10px var(--font);cursor:pointer;color:var(--muted);border-right:1px solid var(--line)}.seg button:last-child{border-right:0}.seg button.active{background:var(--ink);color:#fff}.view{display:none;min-height:0;height:100%}.view.active{display:block}.list{height:100%;overflow:auto;padding:0 12px 18px}.park{display:grid;grid-template-columns:24px 1fr auto;gap:9px;padding:12px 9px;border-top:1px solid var(--line);cursor:pointer;transition:background .15s}.park:last-child{border-bottom:1px solid var(--line)}.park:hover{background:#efeee9}.park.active{background:var(--green-soft);box-shadow:inset 3px 0 0 var(--green)}.num{font:500 10px var(--mono);color:var(--muted);padding-top:2px}.park-name{font-weight:700;font-size:13px;letter-spacing:-.015em;line-height:1.4}.park-meta{margin-top:4px;color:var(--muted);font-size:10px}.park-tags{margin-top:7px;display:flex;gap:4px;flex-wrap:wrap}.tag{border:1px solid var(--line);border-radius:99px;padding:2px 6px;font:500 9px var(--mono);color:var(--muted);background:#fff}.tag.qhigh{background:#e8f0e9;color:#30563f;border-color:#b9c9ba}.tag.qmid{background:#f6f0df;color:#856a2b;border-color:#dfcf9a}.tag.qlow{background:var(--orange-soft);color:#aa4934;border-color:#edc0b5}.arrow{align-self:center;color:#8e948d;font-size:16px}.tablewrap{height:100%;overflow:auto;padding:0 12px 18px}.tablewrap table{border-collapse:collapse;width:100%;font-size:11px}.tablewrap th,.tablewrap td{padding:10px 7px;border-top:1px solid var(--line);text-align:left;vertical-align:top}.tablewrap th{position:sticky;top:0;background:var(--paper);color:var(--muted);font:500 9px var(--mono);letter-spacing:.04em}.tablewrap tr{cursor:pointer}.tablewrap tr:hover,.tablewrap tr.active{background:var(--green-soft)}
.main{position:relative;min-width:0;background:#dfe4df}.mapframe{height:100%;width:100%;position:relative}#map{height:100%;width:100%}.topbar{position:absolute;z-index:800;top:18px;left:20px;right:20px;display:flex;justify-content:space-between;gap:12px;pointer-events:none}.maptitle,.mapcontrols{pointer-events:auto}.maptitle{padding:9px 11px;background:rgba(247,246,242,.93);backdrop-filter:blur(8px);border:1px solid rgba(213,214,206,.95);border-radius:8px;box-shadow:0 7px 22px rgba(20,25,21,.1);font:500 10px var(--mono);color:var(--muted)}.mapcontrols{display:flex;gap:6px}.mapcontrols button{height:32px;border:1px solid rgba(213,214,206,.95);background:rgba(247,246,242,.94);border-radius:7px;padding:0 10px;font:500 10px var(--font);color:var(--ink);cursor:pointer;box-shadow:0 5px 14px rgba(20,25,21,.09)}.mapcontrols button.active{background:var(--ink);color:white;border-color:var(--ink)}
.detail{position:absolute;z-index:850;left:20px;bottom:20px;width:min(510px,calc(100% - 40px));background:rgba(247,246,242,.96);backdrop-filter:blur(12px);border:1px solid rgba(213,214,206,.98);border-radius:12px;box-shadow:0 16px 42px rgba(20,25,21,.18);overflow:hidden}.detail-top{padding:16px 18px 12px;display:flex;justify-content:space-between;gap:12px;border-bottom:1px solid var(--line)}.detail-kicker{font:500 9px var(--mono);letter-spacing:.08em;color:var(--green);text-transform:uppercase}.detail h2{font-size:21px;letter-spacing:-.04em;line-height:1.25;margin:5px 0 0}.closeDetail{border:0;background:transparent;color:#8b918a;font-size:18px;cursor:pointer;line-height:1;padding:0}.detail-body{padding:13px 18px 16px}.detail-summary{margin:0;color:#3d463f;font-size:12px;line-height:1.75}.detail-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:12px}.metric{border:1px solid var(--line);border-radius:7px;padding:7px 8px;background:#fff}.metric b{display:block;font:500 8px var(--mono);color:var(--muted);margin-bottom:3px}.metric span{display:block;font-size:11px;line-height:1.35}.detail-actions{display:flex;gap:7px;margin-top:12px}.detail-actions a{display:inline-flex;align-items:center;justify-content:center;padding:8px 10px;border-radius:7px;border:1px solid var(--line-strong);background:#fff;text-decoration:none;font-size:11px;font-weight:600}.detail-actions a.primary{background:var(--green);color:#fff;border-color:var(--green)}.detail-actions a:hover{filter:brightness(.97)}
.pin{width:14px;height:14px;border:2px solid #fff;border-radius:50%;background:var(--green);box-shadow:0 2px 8px rgba(0,0,0,.28)}.pin.selected{width:19px;height:19px;background:var(--orange);border-width:3px}.leaflet-popup-content-wrapper{border-radius:10px;box-shadow:0 12px 28px rgba(0,0,0,.2)}.leaflet-popup-content{margin:10px 12px}.popup-name{font-weight:700;font-size:12px}.popup-meta{font-size:10px;color:#6f766f;margin-top:3px}.popup-link{font-size:10px;color:var(--green);font-weight:700;margin-top:7px;display:inline-block}.leaflet-control-attribution{font-size:9px!important;background:rgba(247,246,242,.82)!important}
@media(max-width:980px){.app{height:auto;min-height:100dvh;grid-template-columns:1fr;grid-template-rows:52dvh auto}.sidebar{border-right:0;border-top:1px solid var(--line);grid-row:2}.main{grid-row:1}.results{min-height:48dvh}.detail{left:12px;bottom:12px;width:calc(100% - 24px)}.topbar{top:12px;left:12px;right:12px}.brand{padding:18px}.filters{padding:12px 14px}.results-head{padding:10px 14px}.list{padding:0 8px 12px}}@media(max-width:540px){.brand h1{font-size:21px}.filterrow{grid-template-columns:1fr 1fr}.detail-grid{grid-template-columns:1fr 1fr}.maptitle{max-width:54%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.detail h2{font-size:18px}}
</style>

<body>
<div class="app">
  <aside class="sidebar">
    <header class="brand">
      <div class="eyebrow">Park Atlas / Ueno — Keio-horinouchi</div>
      <h1>広域・総合公園<br>20地点</h1>
      <p>木陰、水辺、丘陵地。7月上旬に落ち着いて過ごせる公園を、位置と滞在環境で見比べる。</p>

      <div class="filterrow"><div class="field"><select id="area"><option value="all">エリア：すべて</option></select></div><div class="field"><select id="type"><option value="all">区分：すべて</option><option value="広域">広域公園</option><option value="総合">総合公園</option></select></div><div class="field"><select id="density"><option value="all">人口密度：すべて</option><option value="高">人口：高</option><option value="中">人口：中</option><option value="低">人口：低</option></select></div><div class="field"><select id="quiet"><option value="all">静寂性：すべて</option><option value="◎">静寂：◎ 高い</option><option value="○">静寂：○ 比較的高い</option><option value="△">静寂：△ 時間帯依存</option></select></div></div>
      <div class="filterfoot"><button id="reset">条件をクリア</button><span class="sync">MAP AUTO-FIT: ON</span></div>
    </section>
    <section class="results"><div class="results-head"><span id="resultNote" class="result-note">20 RESULTS</span><div class="seg"><button id="cardTab" class="active">一覧</button><button id="tableTab">表</button></div></div><div id="cardView" class="view active"><div id="list" class="list"></div></div><div id="tableView" class="view"><div class="tablewrap"><table><thead><tr><th>公園</th><th>駅</th><th>静寂</th></tr></thead><tbody id="tbody"></tbody></table></div></div></section>
  </aside>
  <main class="main"><div class="mapframe"><div id="map"></div><div class="topbar"><div id="mapTitle" class="maptitle">20 地点を表示</div><div class="mapcontrols"><button id="streetBtn" class="active">地図</button><button id="photoBtn">航空写真</button><button id="fitBtn">範囲に合わせる</button></div></div><article id="detail" class="detail"><div class="detail-top"><div><div id="detailKicker" class="detail-kicker"></div><h2 id="detailName"></h2></div><button id="closeDetail" class="closeDetail" title="詳細を閉じる">×</button></div><div class="detail-body"><p id="detailSummary" class="detail-summary"></p><div id="detailGrid" class="detail-grid"></div><div id="detailActions" class="detail-actions"></div></div></article></div></main>
</div>

<script>
const parks=[
{id:1,name:'上野恩賜公園',type:'広域',area:'上野',address:'東京都台東区上野公園・池之端三丁目',lat:35.7148,lng:139.7745,ha:'約53ha',station:'上野駅',walk:2,density:'高',quiet:'△',summary:'池・樹林・文化施設が重なる都市の森。7月は不忍池の蓮が季節の核になる。',url:'https://www.tokyo-park.or.jp/park/ueno/'},
{id:2,name:'代々木公園',type:'広域',area:'原宿・代々木',address:'東京都渋谷区代々木神園町2-1',lat:35.6711,lng:139.6949,ha:'約54ha',station:'原宿駅',walk:3,density:'高',quiet:'△',summary:'大芝生とケヤキ・雑木林が連続する、都心最大級の樹冠空間。',url:'https://www.tokyo-park.or.jp/park/yoyogi/'},
{id:3,name:'新宿御苑',type:'広域',area:'新宿',address:'東京都新宿区内藤町11',lat:35.6852,lng:139.7100,ha:'約58ha',station:'新宿御苑前駅',walk:5,density:'高',quiet:'○',summary:'芝生、日本庭園、温室を歩き分けられる。都市中心で静かに滞在しやすい大庭園。',url:'https://fng.or.jp/shinjuku/'},
{id:4,name:'明治神宮内苑',type:'広域',area:'原宿・代々木',address:'東京都渋谷区代々木神園町1-1',lat:35.6764,lng:139.6993,ha:'約70ha',station:'原宿駅',walk:1,density:'高',quiet:'○',summary:'参道から奥へ進むほど、都心の音が薄れる鎮守の森。',url:'https://www.meijijingu.or.jp/'},
{id:5,name:'北の丸公園',type:'広域',area:'皇居・九段',address:'東京都千代田区北の丸公園1-1',lat:35.6936,lng:139.7500,ha:'約19ha',station:'九段下駅',walk:5,density:'高',quiet:'○',summary:'石垣、起伏、樹林が残る皇居北側の緑地。木陰と地形の奥行きが強い。',url:'https://www.env.go.jp/garden/kokyogaien/about/kitanomaru.html'},
{id:6,name:'附属自然教育園',type:'広域',area:'目黒',address:'東京都港区白金台5-21-5',lat:35.6365,lng:139.7164,ha:'約20ha',station:'目黒駅',walk:7,density:'高',quiet:'◎',summary:'湿地・草地・林を残した、手を入れすぎない森。静寂性を最優先する候補。',url:'https://www.ins.kahaku.go.jp/'},
{id:7,name:'井の頭恩賜公園',type:'広域',area:'吉祥寺',address:'東京都武蔵野市御殿山1-18-31',lat:35.6992,lng:139.5705,ha:'約43ha',station:'吉祥寺駅',walk:5,density:'高',quiet:'○',summary:'池と雑木林を一周できる水辺型公園。西園側は比較的落ち着く。',url:'https://www.tokyo-park.or.jp/park/inokashira/'},

{id:9,name:'小山内裏公園',type:'広域',area:'多摩境',address:'東京都町田市小山ヶ丘4-4',lat:35.6164,lng:139.3722,ha:'約46ha',station:'多摩境駅',walk:10,density:'低',quiet:'◎',summary:'多摩丘陵の雑木林、谷戸、湿地を歩く。真夏も厚い木陰を選びやすい。',url:'https://www.tokyo-park.or.jp/park/oyamadairi/'},
{id:10,name:'国営昭和記念公園',type:'広域',area:'立川',address:'東京都立川市緑町3173',lat:35.7141,lng:139.3937,ha:'約180ha',station:'立川駅',walk:10,density:'中',quiet:'○',summary:'原っぱ、森、水辺、庭園が連続する一日規模の公園。暑い時間の退避先が多い。',url:'https://www.showakinen-koen.jp/'},
{id:11,name:'戸山公園',type:'総合',area:'早稲田',address:'東京都新宿区戸山1・2・3丁目',lat:35.7083,lng:139.7189,ha:'約19ha',station:'早稲田駅',walk:5,density:'高',quiet:'○',summary:'箱根山の起伏と運動広場をもつ、都心では珍しい地形型の総合公園。',url:'https://www.tokyo-park.or.jp/park/toyama/'},
{id:12,name:'新宿中央公園',type:'総合',area:'新宿',address:'東京都新宿区西新宿2-11',lat:35.6897,lng:139.6896,ha:'約9ha',station:'都庁前駅',walk:1,density:'高',quiet:'△',summary:'高層街の足元に水辺・芝生・樹林がある。平日昼の短時間滞在に向く。',url:'https://shinjukuchuo-park.jp/'},
{id:13,name:'芝公園',type:'総合',area:'芝・浜松町',address:'東京都港区芝公園1〜4丁目',lat:35.6557,lng:139.7485,ha:'約12ha',station:'御成門駅',walk:2,density:'高',quiet:'○',summary:'寺社、古木、芝生が分散する歴史的緑地。東京タワー周辺を外すと落ち着く。',url:'https://www.tokyo-park.or.jp/park/shiba/'},
{id:14,name:'青山公園',type:'総合',area:'青山',address:'東京都港区六本木7丁目',lat:35.6648,lng:139.7251,ha:'約5ha',station:'乃木坂駅',walk:5,density:'高',quiet:'○',summary:'青山霊園の緑と連続する、都心の小さな木陰の公園。',url:'https://www.tokyo-park.or.jp/park/aoyama/'},
{id:15,name:'明治公園',type:'総合',area:'国立競技場',address:'東京都新宿区霞ヶ丘町5-7',lat:35.6795,lng:139.7140,ha:'約3ha',station:'国立競技場駅',walk:2,density:'高',quiet:'△',summary:'再整備された芝生・樹木・広場の公園。都市観察と短い休憩を両立しやすい。',url:'https://www.meijipark.tokyo/'},
{id:16,name:'武蔵国分寺公園',type:'総合',area:'西国分寺',address:'東京都国分寺市泉町2-1-1',lat:35.7011,lng:139.4616,ha:'約11ha',station:'西国分寺駅',walk:10,density:'中',quiet:'○',summary:'円形広場、池、木陰がまとまる武蔵野型の総合公園。',url:'https://www.tokyo-park.or.jp/park/musashikokubunji/'},
{id:17,name:'府中の森公園',type:'総合',area:'府中',address:'東京都府中市浅間町1-3-1',lat:35.6802,lng:139.4992,ha:'約17ha',station:'東府中駅',walk:10,density:'中',quiet:'○',summary:'森、丘、水辺、美術館、運動施設が重なる。活動と休息の選択肢が広い。',url:'https://www.tokyo-park.or.jp/park/fuchunomori/'},
{id:18,name:'多摩中央公園',type:'総合',area:'多摩センター',address:'東京都多摩市落合2-35',lat:35.6245,lng:139.4254,ha:'約12ha',station:'多摩センター駅',walk:5,density:'中',quiet:'○',summary:'大池、芝生、図書館・文化施設が近接する、多摩センターの居間。',url:'https://tama-central-park.jp/'},

function icon(selected=false){return L.divIcon({className:'',html:`<div class="pin ${selected?'selected':''}"></div>`,iconSize:selected?[19,19]:[14,14],iconAnchor:selected?[10,10]:[7,7]})}
function quietLabel(v){return v==='◎'?'◎ 高い':v==='○'?'○ 比較的高い':'△ 時間帯依存'}
function popup(p){return `<div><div class="popup-name">${esc(p.name)}</div><div class="popup-meta">${esc(p.station)} 徒歩${p.walk}分 ｜ 静寂 ${quietLabel(p.quiet)}</div><a class="popup-link" href="${mapUrl(p)}" target="_blank" rel="noopener">Google Mapsで開く ↗</a></div>`}
function fitToParks(items){const pts=items.filter(p=>Number.isFinite(p.lat)&&Number.isFinite(p.lng)).map(p=>[p.lat,p.lng]);if(!pts.length){map.setView([35.66,139.58],10);return;}if(pts.length===1){map.setView(pts[0],15);return;}map.fitBounds(pts,{padding:[80,80],maxZoom:13});}
function updateMarkers(){markers.forEach(m=>m.remove());markers.clear();current.forEach(p=>{const m=L.marker([p.lat,p.lng],{icon:icon(p.id===selectedId),title:p.name}).addTo(map).bindPopup(popup(p));m.on('click',()=>selectPark(p.id,false,true));markers.set(p.id,m);});}
function renderDetail(p){$('detail').style.display='block';$('detailKicker').textContent=`${p.type}公園 / ${p.area} / ${p.ha}`;$('detailName').textContent=p.name;$('detailSummary').textContent=p.summary;$('detailGrid').innerHTML=`<div class="metric"><b>最寄り駅</b><span>${esc(p.station)}<br>徒歩${p.walk}分</span></div><div class="metric"><b>予想人口密度</b><span>${p.density}</span></div><div class="metric"><b>静寂性</b><span>${quietLabel(p.quiet)}</span></div><div class="metric"><b>規模</b><span>${p.ha}</span></div>`;$('detailActions').innerHTML=`<a class="primary" href="${esc(p.url)}" target="_blank" rel="noopener">公式ページ ↗</a><a href="${mapUrl(p)}" target="_blank" rel="noopener">Google Maps ↗</a>`;}
function tag(p){let c=p.quiet==='◎'?'qhigh':p.quiet==='○'?'qmid':'qlow';return `<span class="tag">${p.type}</span><span class="tag">${p.station} ${p.walk}分</span><span class="tag ${c}">静寂 ${p.quiet}</span>`}
function renderResults(){const list=$('list'),tbody=$('tbody');$('headCount').textContent=`${current.length} PARKS`;$('resultNote').textContent=`${String(current.length).padStart(2,'0')} RESULTS`;$('mapTitle').textContent=`${current.length} 地点を表示`;
if(!current.length){list.innerHTML='<div style="padding:28px 12px;color:var(--muted);font-size:12px">条件に合う公園がありません。</div>';tbody.innerHTML='';return;}
list.innerHTML=current.map((p,i)=>`<article class="park ${p.id===selectedId?'active':''}" data-id="${p.id}"><div class="num">${String(i+1).padStart(2,'0')}</div><div><div class="park-name">${esc(p.name)}</div><div class="park-meta">${esc(p.area)} ／ ${p.ha}</div><div class="park-tags">${tag(p)}</div></div><div class="arrow">›</div></article>`).join('');
tbody.innerHTML=current.map(p=>`<tr data-id="${p.id}" class="${p.id===selectedId?'active':''}"><td><b>${esc(p.name)}</b><br><span style="color:var(--muted);font-size:10px">${esc(p.area)} / ${p.ha}</span></td><td>${esc(p.station)}<br>${p.walk}分</td><td>${p.quiet}</td></tr>`).join('');
document.querySelectorAll('[data-id]').forEach(el=>el.addEventListener('click',()=>selectPark(Number(el.dataset.id),true,true)));}
function selectPark(id,pan=true,openPopup=false){const p=parks.find(x=>x.id===id);if(!p)return;selectedId=id;renderDetail(p);document.querySelectorAll('[data-id]').forEach(el=>el.classList.toggle('active',Number(el.dataset.id)===id));markers.forEach((m,k)=>m.setIcon(icon(k===id)));if(pan)map.flyTo([p.lat,p.lng],Math.max(map.getZoom(),14),{duration:.45});if(openPopup)markers.get(id)?.openPopup();}
function rerender(fit=true){const q=$('search').value.trim().toLowerCase(),a=$('area').value,t=$('type').value,d=$('density').value,qt=$('quiet').value;current=parks.filter(p=>(!q||[p.name,p.area,p.address,p.station,p.summary].join(' ').toLowerCase().includes(q))&&(a==='all'||p.area===a)&&(t==='all'||p.type===t)&&(d==='all'||p.density===d)&&(qt==='all'||p.quiet===qt));if(!current.some(p=>p.id===selectedId))selectedId=current[0]?.id??null;renderResults();updateMarkers();if(selectedId)renderDetail(parks.find(p=>p.id===selectedId));else $('detail').style.display='none';if(fit)fitToParks(current);}
function initAreas(){const areas=[...new Set(parks.map(p=>p.area))].sort((a,b)=>a.localeCompare(b,'ja'));$('area').innerHTML='<option value="all">エリア：すべて</option>'+areas.map(a=>`<option value="${esc(a)}">${esc(a)}</option>`).join('');}
['search','area','type','density','quiet'].forEach(id=>$(id).addEventListener(id==='search'?'input':'change',()=>rerender(true)));
$('reset').addEventListener('click',()=>{ $('search').value='';['area','type','density','quiet'].forEach(id=>$(id).value='all');rerender(true);});
$('fitBtn').addEventListener('click',()=>fitToParks(current));
$('streetBtn').addEventListener('click',()=>{if(map.hasLayer(photo))map.removeLayer(photo);street.addTo(map);$('streetBtn').classList.add('active');$('photoBtn').classList.remove('active');});
$('photoBtn').addEventListener('click',()=>{if(map.hasLayer(street))map.removeLayer(street);photo.addTo(map);$('photoBtn').classList.add('active');$('streetBtn').classList.remove('active');});
$('cardTab').addEventListener('click',()=>{$('cardTab').classList.add('active');$('tableTab').classList.remove('active');$('cardView').classList.add('active');$('tableView').classList.remove('active')});
$('tableTab').addEventListener('click',()=>{$('tableTab').classList.add('active');$('cardTab').classList.remove('active');$('tableView').classList.add('active');$('cardView').classList.remove('active')});
$('closeDetail').addEventListener('click',()=>{$('detail').style.display='none';});
initAreas();rerender(true);
</script>
</body>
</html>
